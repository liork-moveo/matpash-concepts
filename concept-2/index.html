<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מתפ״ש · קונספט 2 — חלק מהשלם</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<style>
  :root{
    --navy:#213357;
    --navy-deep:#213357;
    --sand:#f8f9fa;
    --cream:rgba(248,249,250,0.2);
    --ink:#213357;
    --muted:#213357;
    --line:#213357;
    --accent:#213357;
    --teal-light:#c2e5ee;
    --on-dark:#f8f9fa;
    --pin-teal:#45b0c4;--pin-green:#1f7a5c;--pin-yellow:#f5b21e;
    --shadow:0 14px 34px rgba(27,53,87,.16);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-padding-top:57px}
  html,body{height:100%}
  body{font-family:'Assistant',system-ui,sans-serif;background:#e5e7e9;color:var(--ink);overflow-x:hidden}
  .phone{position:relative;width:100%;max-width:375px;height:100dvh;margin:0 auto;background:var(--sand);box-shadow:0 0 60px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden}
  /* on a real phone the shell fills the screen edge-to-edge (mockup frame only on wider screens) */

  /* nested scroll: hero + content are two snap "pages"; the grid scrolls inside .panels,
     so scrolling the images never moves the pager (no bounce back to the tabs). */
  .pager{flex:1;min-height:0;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .pager::-webkit-scrollbar{display:none}
  .page{height:100%;scroll-snap-align:start;scroll-snap-stop:always}
  .content{display:flex;flex-direction:column;background:var(--sand)}
  .panels{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  header{position:sticky;top:0;z-index:60;width:100%;height:57px;
    display:flex;align-items:center;justify-content:space-between;padding:0 19px;
    background:var(--sand);box-shadow:0 1px 0 rgba(0,0,0,0.06)}
  .h-social{display:flex;gap:12px;align-items:center}
  .h-social .ig{width:18.43px;height:18.43px}
  .h-social .tt{width:17px;height:17px}
  .logo-c{height:48.73px;width:48.73px;object-fit:contain}
  /* centre the emblem on the phone screen, not between the burger and the social icons */
  header>.logo-c{position:absolute;left:50%;transform:translateX(-50%)}
  .burger{width:19.9px;height:14px;display:flex;flex-direction:column;justify-content:space-between}
  .burger span{height:2px;background:var(--ink);border-radius:2px}

  /* HERO */
  .hero{height:100%;position:relative;display:flex;flex-direction:column;justify-content:flex-end;
    align-items:center;text-align:center;padding:0 24px 150px;color:var(--on-dark);overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:url('../assets/hero.jpg') center 22%/cover}
  .hero::after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(18,39,64,.5),rgba(18,39,64,.32) 45%,rgba(18,39,64,.75))}
  .hero .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .hero>*{position:relative;z-index:2}
  .hero .eyebrow{background:var(--cream);color:#ffffff;font-size:14px;font-weight:400;letter-spacing:0.56px;line-height:1.6;
    height:30px;display:inline-flex;align-items:center;padding:0 15px;border-radius:9999px;margin-bottom:8px}
  .hero h1{font-size:42px;font-weight:700;line-height:0.92;width:331px;max-width:none}
  .hero p{font-size:18px;line-height:1.2;margin-top:20px;opacity:.95;max-width:294px}
  .hero p b{font-weight:700}
  .scroll-hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:3;color:var(--on-dark);opacity:.85;animation:bob 1.8s infinite}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}

  /* TABS */
  .tabs{flex:0 0 auto;z-index:55;background:var(--sand);display:flex;justify-content:center;gap:25px;
    padding:20px 12px 12px}
  .tab{flex:0 0 auto;padding:6px 4px 12px;font-size:14px;font-weight:700;letter-spacing:-0.28px;color:var(--navy);position:relative}
  .tab.on::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:60px;height:1.8px;border-radius:3px;background:var(--navy)}

  .panel{display:none;padding:22px 20px 120px;animation:fade .35s}
  .panel.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ROLES GRID */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .g-card{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:159/242}
  .g-card img{width:100%;height:100%;object-fit:cover;transition:.4s}
  .g-card:active img{transform:scale(1.05)}
  .g-card::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8),rgba(0,0,0,0) 55%)}
  .g-card span{position:absolute;bottom:16.4px;inset-inline:14px;z-index:2;color:var(--on-dark);font-size:18px;font-weight:700;line-height:1.2}

  /* ROLE DETAIL MODAL */
  .sheet{position:fixed;top:0;bottom:0;left:50%;transform:translate(-50%,100%);width:100%;max-width:375px;z-index:100;
    background:#f8f9fa;overflow-y:auto;visibility:hidden;transition:transform .35s ease,visibility .35s}
  .sheet.open{transform:translate(-50%,0);visibility:visible}
  .sheet-card{width:100%;background:#f8f9fa;position:relative;padding:0 0 30px;min-height:100%}
  .sheet-top{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 20px 0}
  .sheet-top .x{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--navy)}
  .sheet-top .flag svg{width:25px;height:25px;stroke:var(--navy)}
  .sheet-body{padding:6px 22px 0;text-align:right}
  .sheet-body h2{font-size:28px;font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:6px}
  .sheet-body .desc{font-size:18px;line-height:1.35;color:var(--navy)}
  .sheet-body .desc .more{color:var(--navy);cursor:pointer;font-weight:700;text-decoration:underline;white-space:nowrap}
  .sheet-body .desc-more{font-size:16px;line-height:1.5;color:var(--navy);margin-top:10px}
  .sheet-body .desc-more b{font-weight:700}
  .chips{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin:16px 0}
  .chips span{background:#fff;border-radius:100px;padding:0 16px;height:34px;font-size:14px;font-weight:300;letter-spacing:.56px;
    line-height:1.6;display:inline-flex;gap:6px;align-items:center;color:var(--navy)}
  .chips svg{width:12px;height:13px;stroke:var(--navy)}
  .role-video{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:331/456;box-shadow:var(--shadow);background:#000;margin:0 22px}
  .role-video video,.role-video img{width:100%;height:100%;object-fit:cover}
  .role-video .cap{position:absolute;bottom:16px;inset-inline:0;padding:0 18px;text-align:center;color:var(--on-dark);font-size:18px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  .role-video .rc-play{transition:opacity .25s}
  /* Shorts-style scrub bar — the caption stays up the whole time */
  .vp-bar{position:relative;height:3px;border-radius:3px;background:rgba(255,255,255,.32);
    margin-top:10px;direction:ltr;cursor:pointer;touch-action:none}
  .vp-bar i{position:absolute;top:0;bottom:0;left:0;width:0;background:#fff;border-radius:3px}
  .vp-bar::after{content:"";position:absolute;left:0;right:0;top:-12px;bottom:-12px}
  .role-video .rc-play{position:absolute;inset:0;margin:auto;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center}
  .role-video .rc-play svg{fill:var(--navy);margin-inline-start:3px}
  .nav-arrows{display:flex;justify-content:center;gap:2px;margin:18px auto 0;background:#fff;border-radius:30px;
    width:96px;height:30px;box-shadow:0 3px 10px rgba(0,0,0,.06);overflow:hidden}
  .nav-arrows button{flex:1;color:var(--navy);font-size:16px}
  .nav-arrows .sep{width:1px;background:var(--line);margin:6px 0}

  /* BASES MAP */
  #p-bases{padding:0}
  #p-bases.on{display:flex;flex-direction:column;height:100%}
  .map-full{position:relative;flex:1;min-height:0;overflow:hidden;background:#eef3e8}
  .mapgl{position:absolute;inset:0;width:100%;height:100%}
  .mpin{width:36px;cursor:pointer;filter:drop-shadow(0 3px 5px rgba(0,0,0,.3));line-height:0;transition:transform .15s}
  .mpin svg{display:block;width:100%;height:auto}
  .mpin .dot{fill:var(--c)}
  .mpin.sel{transform:scale(1.18)}
  .map-hint{flex:0 0 auto;text-align:center;color:var(--muted);font-size:13.5px;padding:12px 20px;margin:0}

  /* base bottom sheet */
  .base-sheet{--peek:340px;position:fixed;bottom:0;left:50%;transform:translate(-50%,100%);width:100%;max-width:375px;z-index:90;
    background:var(--sand);border-radius:22px 22px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.2);padding:10px 22px 34px;
    transition:transform .4s;max-height:82vh;overflow-y:auto;cursor:pointer}
  .base-sheet.open{transform:translate(-50%,calc(100% - var(--peek)))}  /* peek already reveals the top of the animation */
  .base-sheet.open.full{transform:translate(-50%,0)}
  .handle{width:44px;height:5px;border-radius:3px;background:#d8dbde;margin:6px auto 14px}
  .base-sheet h3{font-size:24px;font-weight:700;color:var(--navy);line-height:1.2}
  .base-sheet p{font-size:16px;color:var(--navy);line-height:1.3;margin-top:8px}
  .base-sheet p b{color:var(--navy);font-weight:700}
  .base-sheet .render{margin-top:16px;border-radius:20px;overflow:hidden;aspect-ratio:16/10}
  .base-sheet .render img,.base-sheet .render video{width:100%;height:100%;object-fit:cover;display:block}
  .base-close{position:absolute;top:14px;left:18px;width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center}

  /* SERVICE TIMELINE */
  .segmented{display:flex;gap:8px;justify-content:flex-start;margin-bottom:24px;
    overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-inline:22px}
  .segmented::-webkit-scrollbar{display:none}
  .segmented button{flex:0 0 auto;white-space:nowrap}
  .segmented button{height:30px;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:.56px;padding:0 18px;background:var(--teal-light);color:var(--navy)}
  .segmented button.on{background:var(--navy);color:var(--on-dark)}
  /* service accordion (one open) + decorative vertical progress line on the inline-start (RTL: right) */
  .acc{position:relative}
  /* connector per row: from this node's centre down to the NEXT node's centre. Last row has none →
     the line is always between two nodes, never trailing below the last one. Follows animated heights. */
  .acc.has-line .acc-row:not(:last-child)::before{content:"";position:absolute;inset-inline-start:18.5px;top:29px;
    height:calc(100% + 10px);width:1px;background:var(--navy);opacity:.5;z-index:0}
  .acc-row{position:relative;margin-bottom:10px}
  .acc.has-line .acc-row{padding-inline-start:56px}
  /* node column (right in RTL) — OUTSIDE the box. Closed dots all identical; open = big circle + icon. */
  .acc-node{position:absolute;inset-inline-start:0;top:0;height:58px;width:38px;display:flex;align-items:center;justify-content:center;z-index:2}
  .acc:not(.has-line) .acc-node{display:none}
  .acc-node .dot{width:12px;height:12px;border-radius:50%;background:var(--sand);border:1.5px solid var(--navy);flex-shrink:0}
  .acc-node .big{width:43px;height:43px;border-radius:50%;background:var(--sand);border:1px solid var(--navy);
    display:none;align-items:center;justify-content:center;flex-shrink:0}
  .acc-node .big svg{width:22px;height:22px;stroke:var(--navy)}
  .acc-row.open .acc-node .dot{display:none}
  .acc-row.open .acc-node .big{display:flex}
  /* the box: closed = white + border (title only); open = ONE navy rectangle holding title + text */
  .acc-box{border-radius:12px;overflow:hidden;background:#fff;border:1px solid rgba(33,51,87,.14);transition:background .2s,border-color .2s}
  .acc-row.open .acc-box{background:var(--navy);border-color:var(--navy)}
  .acc-head{width:100%;display:flex;align-items:center;min-height:58px;padding:0 20px;text-align:right;
    font-size:22px;font-weight:700;color:var(--navy);line-height:1.15;transition:color .2s}
  .acc-row.open .acc-head{color:var(--on-dark)}
  .acc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease}
  .acc-row.open .acc-body{grid-template-rows:1fr}
  .acc-body>div{overflow:hidden}
  .acc-body p{font-size:16px;line-height:1.5;color:var(--on-dark);padding:0 20px 18px;text-align:right}
  /* image — separate element BELOW the box, shown only when the stage is open. Multi-image steps
     auto-rotate (crossfade) while open — behaviour matches the demo-1-v3 stepper. */
  .acc-media{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
  .acc-row.open .acc-media{grid-template-rows:1fr;margin-top:6px}
  .acc-media>div{overflow:hidden}
  .acc-slides{position:relative;aspect-ratio:300/158;border-radius:12px;overflow:hidden}
  .acc-slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s ease}
  .acc-slide.on{opacity:1}
  @media (prefers-reduced-motion: reduce){ .acc-body,.acc-media,.acc-slide{transition:none} }

  .wa{position:fixed;bottom:16.52px;left:18px;z-index:55;width:43px;height:43px;border-radius:50%;
    background:#fff;filter:drop-shadow(0 0 6px rgba(0,0,0,.08));display:flex;align-items:center;justify-content:center}
  .wa svg{width:26.81px;height:26.81px}
  /* desktop mock: keep it inside the phone frame; on a phone it is a flat 18px from the edge */
  @media (min-width:700px){ .wa{left:calc(50% - 187.5px + 18px)} }
  /* ---------- boot: emblem draws itself, then shrinks up into the nav bar ---------- */
  .boot{position:fixed;inset:0;z-index:200;background:var(--sand);display:grid;place-items:center;
    transition:background-color .6s ease,opacity .35s ease}
  .boot.lift{background:transparent}
  .boot.gone{opacity:0;pointer-events:none}
  .boot-logo{width:min(74vw,300px);
    transition:transform .9s cubic-bezier(.6,.02,.3,1),opacity .3s ease}
  .boot-logo svg{width:100%;height:auto;display:block}
  /* the bar starts with no emblem — the one that just drew itself becomes it */
  #navLogo{opacity:0}
  #navLogo.landed{opacity:1;transition:opacity .3s ease}
  /* ---------- side menu (Figma 1912-545) ---------- */
  .side-menu{position:fixed;top:0;bottom:0;left:50%;width:100%;max-width:375px;transform:translate(-50%,-100%);z-index:120;background:var(--sand);
    transition:transform .38s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;visibility:hidden}
  .side-menu.open{transform:translate(-50%,0);visibility:visible}
  .sm-head{flex:0 0 57px;position:relative;display:flex;align-items:center;justify-content:center}
  .sm-close{position:absolute;right:19px;top:50%;transform:translateY(-50%);
    width:14px;height:19.9px;display:flex;justify-content:space-between;align-items:stretch}
  .sm-close span{width:2px;background:var(--ink);border-radius:2px}
  .sm-list{margin-top:25px;display:flex;flex-direction:column;padding:0 10px}
  .sm-list a{height:58px;margin-bottom:11px;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:700;color:var(--ink);text-decoration:none;text-align:center}
  .sm-list a:active{opacity:.6}
  .sm-foot{margin-top:auto;padding:0 22px 14px;display:flex;align-items:center;justify-content:space-between}
  .sm-wa{display:inline-flex;align-items:center;gap:5px;background:#fff;border-radius:9999px;
    height:53.7px;padding:0 22px;text-decoration:none;color:var(--ink);font-size:15px;font-weight:600;
    box-shadow:0 4px 14px rgba(20,51,61,.10)}
  .sm-wa svg{width:32px;height:32px;flex:0 0 32px}
  .sm-social{display:flex;gap:8px}
  .sm-ic{width:43px;height:43px;border-radius:50%;border:1px solid var(--ink);
    display:flex;align-items:center;justify-content:center}
  .sm-ic .ig{width:18.43px;height:18.43px}
  .sm-ic .tt{width:17px;height:17px}
  /* mobile overrides last so they win the cascade over the component rules above */
  @media (max-height:720px){ .base-sheet{--peek:300px} }
  @media (max-height:600px){ .base-sheet{--peek:250px} }
  @media (max-width:699px){
    body{background:var(--sand)}
    .phone,.sheet,.base-sheet,.side-menu{max-width:none}
    .phone{box-shadow:none}
    /* true edge-to-edge: no centring maths, so no sliver of the page shows at the sides */
    .sheet{left:0;width:100vw;transform:translate(0,100%)}
    .sheet.open{transform:translate(0,0)}
    .base-sheet{left:0;width:100vw;transform:translate(0,100%)}
    .base-sheet.open{transform:translate(0,calc(100% - var(--peek)))}
    .base-sheet.open.full{transform:translate(0,0)}
    .side-menu{left:0;transform:translate(0,-100%)}
    .side-menu.open{transform:translate(0,0)}
  }
</style>
</head>
<body>
<div class="phone">

  <div class="side-menu" id="sideMenu">
    <div class="sm-head">
      <img class="logo-c" src="../assets/logo-color.png" alt="מתפ״ש">
      <button class="sm-close" id="smClose" aria-label="סגירת תפריט"><span></span><span></span><span></span></button>
    </div>
    <nav class="sm-list">
      <a href="#" onclick="return false">על המתפ״ש</a>
      <a href="#" onclick="return false">תשובות לשאלות שלכם</a>
      <a href="#" data-tab="roles">האופציות של התפקידים</a>
      <a href="#" data-tab="bases">מיקומי בסיסים</a>
      <a href="#" data-tab="service">גיוס, הכשרה ומסלולי שירות</a>
    </nav>
    <div class="sm-foot">

/* ---------- Shorts-style video player (tap = play/pause, scrubbable bar) ---------- */
function wireVideo(vid, playBtn, bar){
  if(!vid) return;
  var fill = bar && bar.querySelector('i');
  function toggle(){ if(vid.paused){ vid.play().catch(function(){}); } else { vid.pause(); } }
  function sync(){ if(playBtn) playBtn.style.opacity = vid.paused ? '1' : '0'; }
  vid.addEventListener('play',sync); vid.addEventListener('pause',sync);
  vid.addEventListener('ended',function(){ if(fill) fill.style.width='0%'; sync(); });
  vid.addEventListener('timeupdate',function(){
    if(fill && vid.duration) fill.style.width=(vid.currentTime/vid.duration*100)+'%'; });
  vid.addEventListener('click',function(e){ e.stopPropagation(); toggle(); });
  if(playBtn) playBtn.addEventListener('click',function(e){ e.stopPropagation(); toggle(); });
  if(bar){
    var scrub=false;
    function seek(e){ var r=bar.getBoundingClientRect();
      var p=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
      if(vid.duration) vid.currentTime=p*vid.duration;
      if(fill) fill.style.width=(p*100)+'%'; }
    bar.addEventListener('pointerdown',function(e){ e.stopPropagation(); scrub=true;
      try{bar.setPointerCapture(e.pointerId);}catch(err){} seek(e); });
    bar.addEventListener('pointermove',function(e){ if(scrub){ e.stopPropagation(); seek(e); } });
    bar.addEventListener('pointerup',function(e){ scrub=false; e.stopPropagation(); });
    bar.addEventListener('click',function(e){ e.stopPropagation(); });
  }
  sync();
}

/* drag the sheet up/down like Google Maps; a plain tap still expands it */
(function(){
  var sh=document.getElementById('baseSheet');
  var grabY=0, startTop=0, rest=0, dragging=false, startFull=false, moved=0;
  function xShift(){ return window.matchMedia('(max-width:699px)').matches ? '0' : '-50%'; }
  sh.addEventListener('pointerdown',function(e){
    if(e.target.closest('.base-close')) return;
    if(sh.scrollTop>0) return;                      /* once scrolled, the inner scroll wins */
    dragging=true; moved=0; grabY=e.clientY;
    startTop=sh.getBoundingClientRect().top;
    rest=window.innerHeight-sh.getBoundingClientRect().height;   /* top position when fully open */
    startFull=sh.classList.contains('full');
    sh.style.transition='none';
    try{ sh.setPointerCapture(e.pointerId); }catch(err){}
  });
  sh.addEventListener('pointermove',function(e){
    if(!dragging) return;
    moved=e.clientY-grabY;
    var top=Math.max(rest,startTop+moved);          /* never drag above fully-open */
    sh.style.transform='translate('+xShift()+','+(top-rest)+'px)';
  });
  function end(){
    if(!dragging) return; dragging=false;
    sh.style.transition=''; sh.style.transform='';
    if(moved<-40) sh.classList.add('full');                                  /* dragged up */
    else if(moved>70){ if(startFull) sh.classList.remove('full'); else closeBase(); }
    else if(Math.abs(moved)<6 && !startFull) sh.classList.add('full');       /* tap */
  }
  sh.addEventListener('pointerup',end);
  sh.addEventListener('pointercancel',end);
})();

function stopSvcRotation(){ if(svcRotTimer){clearInterval(svcRotTimer);svcRotTimer=0;} }
function startSvcRotation(row){

  if(slides.length<2) return;
  let idx=slides.findIndex(s=>s.classList.contains('on')); if(idx<0)idx=0;
  svcRotTimer=setInterval(()=>{ slides[idx].classList.remove('on'); idx=(idx+1)%slides.length; slides[idx].classList.add('on'); },2800);
}

/* ---------- boot hand-off (reference: brand.dropbox.com) ---------- */
(function(){
  var boot=document.getElementById('boot'), bl=document.getElementById('bootLogo'),
      nav=document.getElementById('navLogo');
  if(!boot||!bl||!nav){ if(nav){nav.classList.add('landed');nav.style.opacity='1';} return; }
  var still=matchMedia('(prefers-reduced-motion: reduce)').matches;
  document.body.style.overflow='hidden';
  /* inline the SVG — CSS animations do not run inside an <img> */
  fetch('../assets/logo-intro.svg').then(function(r){return r.text();})
   .then(function(t){ bl.innerHTML=t; start(); })
   .catch(function(){ nav.classList.add('landed'); nav.style.opacity='1'; boot.remove(); document.body.style.overflow=''; });
  function start(){
  setTimeout(function(){
    var a=bl.getBoundingClientRect(), b=nav.getBoundingClientRect();
    bl.style.transform='translate('+((b.left+b.width/2)-(a.left+a.width/2))+'px,'
      +((b.top+b.height/2)-(a.top+a.height/2))+'px) scale('+(b.width/a.width)+')';
    boot.classList.add('lift');
    setTimeout(function(){                 /* crossfade the flying emblem into the real nav logo */
      nav.classList.add('landed'); nav.style.opacity='1';   /* inline beats the cascade */
      bl.style.opacity='0'; boot.classList.add('gone');
      document.body.style.overflow='';
      setTimeout(function(){ boot.remove(); },420);
    }, still?60:780);
  }, still?250:3400);                      /* the SVG draw+paint runs ~3.3s */
  }
})();
